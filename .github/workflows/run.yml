name: Run Rating Engine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run Mexico vs South Africa
        run: python rating_engine.py mexico_sa

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ratings
          path: data_mexico_sa_ratings.csv
