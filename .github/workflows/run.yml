name: Run Soccer Ratings

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas

      - name: Run model
        run: python src/main.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ratings-output
          path: output_ratings.csv
