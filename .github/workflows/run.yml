name: Run Soccer Rating Engine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run rating engine
        run: python rating_engine.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: player-ratings
          path: data/player_ratings.csv
