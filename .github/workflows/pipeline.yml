name: Full Soccer Rating Pipeline

on:
  push:
    paths:
      - "data/**"
      - "rating_engine.py"
      - "rating/**"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =====================================================
      # PYTHON SETUP
      # =====================================================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =====================================================
      # INSTALL DEPENDENCIES
      # =====================================================
      - name: Install dependencies
        run: pip install pandas numpy

      # =====================================================
      # RUN PIPELINE (FIXED ENTRY POINT)
      # =====================================================
      - name: Detect matches and run engine
        run: |
          echo "=== SCANNING DATA FOLDER ==="

          shopt -s nullglob
          files=(data/*_stats.csv)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No stats files found. Exiting safely."
            exit 0
          fi

          for stats_file in "${files[@]}"; do

            match_name=$(basename "$stats_file" _stats.csv)

            echo ""
            echo "======================================"
            echo "Running match: $match_name"
            echo "======================================"

            # ✅ FIXED LINE (this replaces rating_engine.py)
            python -m rating.engine "$match_name" \
              | tee "data/${match_name}_log.txt" || echo "FAILED: $match_name"

          done

      # =====================================================
      # UPLOAD OUTPUT FILES
      # =====================================================
      - name: Upload all ratings
        uses: actions/upload-artifact@v4
        with:
          name: all-match-ratings
          path: |
            data/*_ratings.csv
            data/*_log.txt
