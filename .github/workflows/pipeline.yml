name: Soccer Rating Pipeline

on:
  push:
    paths:
      - "data/**"
      - "rating/**"
      - "run.py"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. GET CODE
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 2. SET UP PYTHON
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 3. INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: pip install pandas numpy

      # =========================
      # 4. RUN YOUR MODEL
      # =========================
      - name: Run rating engine
        run: python run.py mexico_sa

      # =========================
      # 5. SAVE OUTPUT FILES
      # =========================
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: soccer-ratings
          path: data/*_ratings.csv
